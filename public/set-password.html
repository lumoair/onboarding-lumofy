<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set your password · Lumofy</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-shell auth-shell-page">
      <section class="auth-card">
        <p class="eyebrow">First-time setup</p>
        <h1>Set your password, __DISPLAY_NAME__.</h1>
        <p class="auth-copy">Choose a password with at least eight characters. You’ll clock in before entering the app.</p>
        <p class="auth-error">__PASSWORD_ERROR__</p>
        <form class="auth-form" method="post" action="/set-password">
          <label class="field"><span>New password</span><input name="password" type="password" minlength="8" autocomplete="new-password" required /></label>
          <label class="field"><span>Confirm password</span><input name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required /></label>
          <button class="primary-button" type="submit">Save password</button>
        </form>
      </section>
    </main>
  </body>
</html>
